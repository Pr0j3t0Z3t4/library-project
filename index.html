<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="normalize.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>My Library</title>
</head>
<body>
    <header>
        <h1>My Library</h1>
        <button id="login">Login</button>
    </header>
    <main>

    <button class="btn">
        
        <span>Add book</span>
      </button>
       <div id="containerForm" class="hidden">
                    <form id="bookForm">
                        <label for="author">Name of author</label>
                        <input type="text" id="author" placeholder="Name" required>

                        <label for="title">Title of book</label>
                        <input type="text" id="title" placeholder="Title" required>

                        <label for="pages">Number of pages</label>
                        <input type="number" id="pages" placeholder="Number" required>

                        <fieldset>
                            <legend>Read?</legend>
                            <label><input type="radio" name="read" value="yes" checked> Yes</label>
                            <label><input type="radio" name="read" value="no"> No</label>
                        </fieldset>

                        <button type="submit">Add Book</button>
                    </form>
        </div>

        <div id ="containerLibrary" class="main">


     </div>
        
    </main>
    <footer></footer>
    

</body>
</html>
