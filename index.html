<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=], initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <header>
        <h1>My Library</h1>
        <button id="login">Login</button>
    </header>
    <main>

        <button id="addBook">Add</button>
       <div id="containerForm" class="hidden">
                <h5>Fill out form</h5>
                    <form id="bookForm">
                        <input type="text" id="author" placeholder="Name of author" required>
                        <input type="text" id="title" placeholder="Title of book" required>
                        <input type="number" id="pages" placeholder="Number of pages" required>

                        <fieldset>
                            <legend>Read?</legend>
                            <label><input type="radio" name="read" value="yes" checked> Yes</label>
                            <label><input type="radio" name="read" value="no"> No</label>
                        </fieldset>

                        <button type="submit">Add Book</button>
                    </form>
        </div>

        <div id ="containerLibrary" class="main">


     </div>
        
    </main>
    <footer></footer>
    

</body>
</html>
